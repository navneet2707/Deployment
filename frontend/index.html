<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navi AI Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#0f172a;
      overflow:hidden;
      color:white;
    }

    .background{
      position:fixed;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#2563eb55,transparent 30%),
      radial-gradient(circle at bottom right,#7c3aed55,transparent 30%),
      #020617;
      z-index:-1;
    }

    .app{
      display:flex;
      flex-direction:column;
      height:100vh;
      width:100%;
      max-width:1000px;
      margin:auto;
    }

    .navbar{
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:28px;
      font-weight:700;
      background:linear-gradient(to right,#60a5fa,#c084fc);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .badge{
      padding:8px 14px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      font-size:13px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .chat-area{
      flex:1;
      overflow-y:auto;
      padding:30px 20px 120px;
      scroll-behavior:smooth;
    }

    .message{
      max-width:75%;
      padding:16px 18px;
      margin-bottom:18px;
      border-radius:18px;
      line-height:1.6;
      animation:fadeIn .3s ease;
      white-space:pre-wrap;
    }

    .user{
      margin-left:auto;
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      border-bottom-right-radius:5px;
    }

    .bot{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius:5px;
    }

    .input-area{
      position:fixed;
      bottom:0;
      width:100%;
      max-width:1000px;
      padding:20px;
      background:rgba(2,6,23,0.7);
      backdrop-filter:blur(15px);
      border-top:1px solid rgba(255,255,255,0.08);
    }

    .input-box{
      display:flex;
      gap:15px;
      align-items:center;
    }

    textarea{
      flex:1;
      resize:none;
      height:60px;
      border:none;
      outline:none;
      border-radius:16px;
      padding:18px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:15px;
      font-family:'Poppins',sans-serif;
      border:1px solid rgba(255,255,255,0.08);
    }

    textarea::placeholder{
      color:#94a3b8;
    }

    button{
      width:60px;
      height:60px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:white;
      font-size:24px;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .typing{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .typing span{
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
      animation:bounce 1.3s infinite;
    }

    .typing span:nth-child(2){
      animation-delay:0.2s;
    }

    .typing span:nth-child(3){
      animation-delay:0.4s;
    }

    @keyframes bounce{
      0%,80%,100%{
        transform:translateY(0);
        opacity:0.5;
      }
      40%{
        transform:translateY(-8px);
        opacity:1;
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .welcome{
      text-align:center;
      margin-top:100px;
      opacity:0.9;
    }

    .welcome h1{
      font-size:60px;
      margin-bottom:20px;
      background:linear-gradient(to right,#60a5fa,#c084fc);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .welcome p{
      color:#cbd5e1;
      font-size:18px;
    }

    @media(max-width:768px){

      .message{
        max-width:90%;
      }

      .welcome h1{
        font-size:40px;
      }

      textarea{
        height:55px;
      }

      button{
        width:55px;
        height:55px;
      }
    }
  </style>
</head>

<body>

<div class="background"></div>

<div class="app">

  <div class="navbar">
    <div class="logo">Navi AI</div>
    <div class="badge">Powered by NexusAI</div>
  </div>

  <div class="chat-area" id="chatArea">

    <div class="welcome">
      <h1>Navi AI</h1>
      <p>Your Personal AI Tutor</p>
    </div>

  </div>

  <div class="input-area">
    <div class="input-box">

      <textarea
        id="prompt"
        placeholder="Ask anything..."
      ></textarea>

      <button onclick="sendMessage()">
        ➤
      </button>

    </div>
  </div>

</div>

<script>

const chatArea = document.getElementById("chatArea");

function addMessage(text, sender){

  const msg = document.createElement("div");

  msg.classList.add("message", sender);

  msg.innerText = text;

  chatArea.appendChild(msg);

  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping(){

  const typing = document.createElement("div");

  typing.classList.add("message","bot");

  typing.id = "typing";

  typing.innerHTML = `
    <div class="typing">
      <span></span>
      <span></span>
      <span></span>
    </div>
  `;

  chatArea.appendChild(typing);

  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

async function sendMessage(){

  const input = document.getElementById("prompt");

  const text = input.value.trim();

  if(!text) return;

  document.querySelector(".welcome")?.remove();

  addMessage(text,"user");

  input.value = "";

  showTyping();

  try{

    const response = await fetch(
      "https://deployment-nu8j.onrender.com/run_task/",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          user_prompt:text
        })
      }
    );

    const data = await response.json();

    removeTyping();

    addMessage(
      data.response || data.error || "Something went wrong",
      "bot"
    );

  }
  catch(error){

    removeTyping();

    addMessage(
      "Unable to connect to backend server.",
      "bot"
    );
  }
}

document
.getElementById("prompt")
.addEventListener("keydown",function(e){

  if(e.key === "Enter" && !e.shiftKey){

    e.preventDefault();

    sendMessage();
  }
});

</script>

</body>
</html>
